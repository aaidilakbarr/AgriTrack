<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dompet - AgriTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        agri: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d', 950: '#052e16' },
                        dark: { bg: '#0f172a', card: '#1e293b', border: '#334155' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body id="mainBody" class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen pb-20 md:pb-24 transition-all duration-300">
    <header class="pt-8 pb-4 px-6 bg-white dark:bg-dark-card shadow-sm sticky top-0 z-30 transition-colors">
        <div class="flex justify-between items-center mb-0">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-dark-border flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-agri-100 transition-colors">
                    <i class="ph ph-arrow-left text-xl"></i>
                </a>
                <h1 class="text-xl font-bold">Dompet & Pembayaran</h1>
            </div>
            <button id="themeToggle" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-dark-border flex items-center justify-center text-gray-600 dark:text-gray-300">
                <i class="ph ph-moon text-xl dark:hidden"></i>
                <i class="ph ph-sun text-xl hidden dark:block"></i>
            </button>
        </div>
    </header>

    <main class="px-5 py-6 grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3" id="walletListContainer">
        <!-- Render from JS -->
        <div class="flex flex-col items-center justify-center py-16 text-gray-400 col-span-full"><i class="ph ph-spinner-gap animate-spin text-4xl mb-4"></i><p>Memuat Data...</p></div>
    </main>

    <!-- FAB -->
    <button id="addWalletBtn" class="fixed bottom-24 right-6 md:right-10 w-14 h-14 bg-agri-600 text-white rounded-full shadow-lg shadow-agri-600/40 flex items-center justify-center hover:bg-agri-700 hover:scale-[1.05] active:scale-95 transition-all z-40">
        <i class="ph ph-plus text-2xl font-bold"></i>
    </button>

    <!-- Bottom Navigation Bar -->
    <nav id="bottomNav"
        class="fixed bottom-0 left-0 right-0 bg-white dark:bg-dark-card border-t border-gray-200 dark:border-dark-border px-2 sm:px-6 py-2 sm:py-3 flex justify-around items-center z-40 transition-all duration-300 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)]">
        <a href="../index.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-house text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Beranda</span>
        </a>
        <a href="dashboard.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-chart-pie-slice text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Analitik</span>
        </a>
        <a href="transactions.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-swap text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Transaksi</span>
        </a>
        <a href="notes.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-notebook text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Catatan</span>
        </a>
        <a href="wallet.html"
            class="flex flex-col items-center gap-1 text-agri-600 dark:text-agri-400 font-bold transition-all">
            <i class="ph-fill ph-wallet text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Dompet</span>
        </a>
    </nav>

    <!-- Wallet Modal -->
    <div id="walletModal" class="fixed inset-0 bg-gray-900/40 dark:bg-gray-950/70 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-end sm:items-center justify-center">
        <div class="bg-white dark:bg-dark-card w-full sm:w-[400px] sm:rounded-3xl rounded-t-3xl p-6 transform translate-y-full sm:translate-y-10 transition-transform duration-300" id="walletModalContent">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold" id="walletModalTitle">Tambah Dompet</h3>
                <button id="closeWalletModalBtn" class="w-8 h-8 rounded-full bg-gray-100 dark:bg-dark-border flex items-center justify-center text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            
            <form id="walletForm" class="space-y-4">
                <input type="hidden" id="walletId">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Jenis Dompet</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="walletCategory" value="cash" class="peer sr-only" required>
                            <div class="text-center py-2 px-1 rounded-xl border border-gray-200 dark:border-dark-border peer-checked:bg-green-100 peer-checked:border-green-500 peer-checked:text-green-700 dark:peer-checked:bg-green-900/30 dark:peer-checked:border-green-700 dark:peer-checked:text-green-400 text-sm font-bold transition-all"><i class="ph ph-money mr-1"></i> Tunai (Cash)</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="walletCategory" value="card" class="peer sr-only">
                            <div class="text-center py-2 px-1 rounded-xl border border-gray-200 dark:border-dark-border peer-checked:bg-blue-100 peer-checked:border-blue-500 peer-checked:text-blue-700 dark:peer-checked:bg-blue-900/30 dark:peer-checked:border-blue-700 dark:peer-checked:text-blue-400 text-sm font-bold transition-all"><i class="ph ph-credit-card mr-1"></i> Kartu Bank</div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nama Dompet</label>
                    <input type="text" id="walletName" required placeholder="Contoh: Brankas / BCA" class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-agri-500 outline-none transition-shadow font-bold">
                </div>
                
                <div class="pt-4 pb-2 flex gap-3">
                    <button type="button" id="deleteWalletBtn" class="hidden px-4 py-3 rounded-xl bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 font-bold hover:bg-red-200 transition-colors">
                        <i class="ph ph-trash text-xl"></i>
                    </button>
                    <button type="submit" class="flex-1 py-3 rounded-xl bg-agri-600 text-white font-bold hover:bg-agri-700 outline-none focus:ring-4 focus:ring-agri-500/50 transition-all shadow-md shadow-agri-600/30">Simpan Dompet</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
