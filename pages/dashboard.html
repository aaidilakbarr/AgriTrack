<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Analitik - AgriTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        agri: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d', 950: '#052e16' },
                        dark: { bg: '#0f172a', card: '#1e293b', border: '#334155' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body id="mainBody" class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen pb-20 md:pb-24 transition-all duration-300">
    <header class="pt-8 pb-4 px-6 bg-white dark:bg-dark-card shadow-sm sticky top-0 z-30 transition-colors">
        <div class="flex justify-between items-center mb-0">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-dark-border flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-agri-100 transition-colors">
                    <i class="ph ph-arrow-left text-xl"></i>
                </a>
                <h1 class="text-xl font-bold">Dashboard Analitik</h1>
            </div>
            <button id="themeToggle" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-dark-border flex items-center justify-center text-gray-600 dark:text-gray-300">
                <i class="ph ph-moon text-xl dark:hidden"></i>
                <i class="ph ph-sun text-xl hidden dark:block"></i>
            </button>
        </div>
    </header>

    <main class="px-5 py-6 space-y-6" id="analyticsContainer">
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white dark:bg-dark-card p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border">
                <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Total Pemasukan</p>
                <p class="text-lg md:text-xl font-bold text-blue-600 dark:text-blue-400" id="statIncome">Rp 0</p>
            </div>
            <div class="bg-white dark:bg-dark-card p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border">
                <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Total Pengeluaran</p>
                <p class="text-lg md:text-xl font-bold text-red-600 dark:text-red-400" id="statExpense">Rp 0</p>
            </div>
            <div class="bg-white dark:bg-dark-card p-4 rounded-2xl shadow-sm border border-agri-200 dark:border-agri-900/50 bg-agri-50 dark:bg-agri-900/10">
                <p class="text-xs font-medium text-agri-700 dark:text-agri-400 mb-1">Net Profit / Saldo</p>
                <p class="text-lg md:text-xl font-bold text-agri-700 dark:text-agri-300" id="statNet">Rp 0</p>
            </div>
        </div>

        <!-- Chart 1: Saldo & Arus Kas (Bar) -->
        <div class="bg-white dark:bg-dark-card border border-gray-100 dark:border-dark-border p-5 rounded-2xl shadow-sm">
            <h3 class="text-lg font-bold mb-4 text-gray-800 dark:text-gray-100">Arus Kas (Pendapatan vs Pengeluaran)</h3>
            <div class="h-64 w-full relative">
                <canvas id="cashflowChart"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Chart 2: Distribusi Kategori (Doughnut) -->
            <div class="bg-white dark:bg-dark-card border border-gray-100 dark:border-dark-border p-5 rounded-2xl shadow-sm flex flex-col">
                <h3 class="text-base font-bold mb-4 text-gray-800 dark:text-gray-100">Persentase Transaksi</h3>
                <div class="flex-1 flex items-center justify-center min-h-[220px] relative">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <!-- Chart 3: Distribusi Dompet (Doughnut) -->
            <div class="bg-white dark:bg-dark-card border border-gray-100 dark:border-dark-border p-5 rounded-2xl shadow-sm flex flex-col">
                <h3 class="text-base font-bold mb-4 text-gray-800 dark:text-gray-100">Penggunaan Dompet</h3>
                <div class="flex-1 flex items-center justify-center min-h-[220px] relative">
                    <canvas id="walletChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav id="bottomNav"
        class="fixed bottom-0 left-0 right-0 bg-white dark:bg-dark-card border-t border-gray-200 dark:border-dark-border px-2 sm:px-6 py-2 sm:py-3 flex justify-around items-center z-50 transition-all duration-300 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)]">
        <a href="../index.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-house text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Beranda</span>
        </a>
        <a href="dashboard.html"
            class="flex flex-col items-center gap-1 text-agri-600 dark:text-agri-400 font-bold transition-all">
            <i class="ph-fill ph-chart-pie-slice text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Analitik</span>
        </a>
        <a href="transactions.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-swap text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Transaksi</span>
        </a>
        <a href="notes.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-notebook text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Catatan</span>
        </a>
        <a href="wallet.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-wallet text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Dompet</span>
        </a>
    </nav>

    <!-- JS -->
    <script src="../js/store.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const isDark = document.documentElement.classList.contains('dark');
            Chart.defaults.color = isDark ? '#94a3b8' : '#64748b'; // slate-400 : slate-500
            Chart.defaults.font.family = '"Plus Jakarta Sans", sans-serif';

            // Watch theme toggle to update chart globally
            const toggle = document.getElementById('themeToggle');
            if(toggle) {
                toggle.addEventListener('click', () => {
                    setTimeout(() => {
                        const newDark = document.documentElement.classList.contains('dark');
                        Chart.defaults.color = newDark ? '#94a3b8' : '#64748b';
                        const charts = Object.values(Chart.instances);
                        charts.forEach(chart => {
                            if(chart.options.scales && chart.options.scales.x) {
                                chart.options.scales.x.grid.color = newDark ? '#334155' : '#f1f5f9';
                                chart.options.scales.y.grid.color = newDark ? '#334155' : '#f1f5f9';
                            }
                            chart.update();
                        });
                    }, 50);
                });
            }

            const transactions = Store.getTransactions();
            const wallets = Store.getWallets();

            // Populate Stats natively
            let inc = 0, exp = 0;
            transactions.forEach(t => {
                const a = parseFloat(t.amount);
                if(t.type==='income') inc += a;
                if(t.type==='expense') exp += a;
            });
            const fmt = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits:0}).format(num);
            document.getElementById('statIncome').textContent = fmt(inc);
            document.getElementById('statExpense').textContent = fmt(exp);
            document.getElementById('statNet').textContent = fmt(inc - exp);

            // Prepare Chart Data
            // Grid lines color based on theme
            const gridColor = isDark ? '#334155' : '#f1f5f9';

            new Chart(document.getElementById('cashflowChart'), {
                type: 'bar',
                data: {
                    labels: ['Pemasukan', 'Pengeluaran'],
                    datasets: [{
                        label: 'Total Rupiah',
                        data: [inc, exp],
                        backgroundColor: ['#3b82f6', '#ef4444'],
                        borderRadius: 6,
                        barPercentage: 0.5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: gridColor, drawBorder: false }
                        },
                        x: {
                            grid: { display: false, drawBorder: false }
                        }
                    }
                }
            });

            // Category Chart (Doughnut)
            let catData = [inc, exp];
            if(inc === 0 && exp === 0) catData = [1, 1]; // fallback empty
            new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Pemasukan', 'Pengeluaran'],
                    datasets: [{
                        data: catData,
                        backgroundColor: ['#3b82f6', '#ef4444'],
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });

            // Wallet Chart
            // map wallets to their transaction occurrence counts
            let wLabels = [];
            let wData = [];
            let wColors = [];
            const wColorPalette = ['#22c55e', '#3b82f6', '#8b5cf6', '#ec4899', '#f97316'];
            
            wallets.forEach((w, idx) => {
                const count = transactions.filter(t => t.walletId === w.id || (!t.walletId && w.id === 'w-cash')).length;
                if(count > 0 || wallets.length <= 2) {
                    wLabels.push(w.name);
                    wData.push(count);
                    wColors.push(wColorPalette[idx % wColorPalette.length]);
                }
            });

            if(wData.length === 0 || wData.every(x => x === 0)) wData = wLabels.map(()=>1); // fallback empty

            new Chart(document.getElementById('walletChart'), {
                type: 'doughnut',
                data: {
                    labels: wLabels,
                    datasets: [{
                        data: wData,
                        backgroundColor: wColors,
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        });
    </script>
</body>
</html>
