<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transaksi - AgriTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        agri: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d', 950: '#052e16' },
                        dark: { bg: '#0f172a', card: '#1e293b', border: '#334155' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body id="mainBody"
    class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen pb-20 md:pb-24 transition-all duration-300">

    <header class="pt-8 pb-4 px-6 bg-white dark:bg-dark-card shadow-sm sticky top-0 z-30 transition-colors">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
                <a href="../index.html"
                    class="w-10 h-10 rounded-full bg-gray-100 dark:bg-dark-border flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-agri-100 transition-colors">
                    <i class="ph ph-arrow-left text-xl"></i>
                </a>
                <h1 class="text-xl font-bold">Daftar Transaksi</h1>
            </div>
            <button id="themeToggle"
                class="w-10 h-10 rounded-full bg-gray-100 dark:bg-dark-border flex items-center justify-center text-gray-600 dark:text-gray-300">
                <i class="ph ph-moon text-xl dark:hidden"></i>
                <i class="ph ph-sun text-xl hidden dark:block"></i>
            </button>
        </div>

        <!-- Search Bar & Calendar Button -->
        <div class="flex gap-2 mb-4 items-start sm:items-center">
            <div class="flex-1 relative">
                <i
                    class="ph ph-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
                <input type="text" id="searchTransactionInput" placeholder="Cari transaksi (Nama, Catatan, Nominal)"
                    class="w-full pl-11 pr-4 py-3 rounded-2xl bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-agri-500 outline-none transition-shadow text-sm">
            </div>
            <button id="openMonthPickerBtn"
                class="shrink-0 p-3 rounded-2xl bg-white dark:bg-dark-card text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-dark-border hover:border-agri-600 hover:text-agri-600 dark:hover:text-agri-400 dark:hover:border-agri-400 transition-all"
                title="Filter berdasarkan bulan">
                <i class="ph ph-calendar text-lg"></i>
            </button>
        </div>

        <!-- Month Display Badge -->
        <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2 mb-2">
            <div id="monthFilterBadge" class="hidden px-3 py-1 rounded-full bg-agri-100 dark:bg-agri-900/30 text-agri-600 dark:text-agri-400 text-xs font-bold flex items-center gap-2 whitespace-nowrap">
                <i class="ph ph-calendar text-sm"></i>
                <span id="monthFilterBadgeText"></span>
                <button id="clearMonthFilterBtn" class="ml-1 hover:opacity-70 transition-opacity">
                    <i class="ph ph-x text-sm"></i>
                </button>
            </div>
        </div>

        <!-- Filter Pills -->
        <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2 pt-2" id="filterContainer">
            <button
                class="filter-btn active px-4 py-2 rounded-full bg-agri-600 text-white text-sm font-bold whitespace-nowrap shadow-md shadow-agri-600/30 border border-agri-600 transition-all"
                data-filter="all">Semua</button>
            <button
                class="filter-btn px-4 py-2 rounded-full bg-white dark:bg-dark-card text-gray-500 dark:text-gray-400 text-sm font-medium whitespace-nowrap border border-gray-200 dark:border-dark-border transition-all"
                data-filter="income">Pemasukan</button>
            <button
                class="filter-btn px-4 py-2 rounded-full bg-white dark:bg-dark-card text-gray-500 dark:text-gray-400 text-sm font-medium whitespace-nowrap border border-gray-200 dark:border-dark-border transition-all"
                data-filter="expense">Pengeluaran</button>
        </div>

        <!-- Month Picker Modal -->
        <div id="monthPickerModal" class="fixed inset-0 bg-gray-900/40 dark:bg-gray-950/70 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-end sm:items-center justify-center">
            <div class="bg-white dark:bg-dark-card w-full sm:w-[420px] max-h-[85vh] overflow-y-auto hide-scrollbar sm:rounded-3xl rounded-t-3xl p-6 transform translate-y-full sm:translate-y-10 transition-transform duration-300"
                id="monthPickerContent">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold">Pilih Bulan & Tahun</h3>
                    <button id="closeMonthPickerBtn"
                        class="w-8 h-8 rounded-full bg-gray-100 dark:bg-dark-border flex items-center justify-center text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors flex-shrink-0">
                        <i class="ph ph-x text-xl"></i>
                    </button>
                </div>

                <div class="mb-6">
                    <!-- Year Navigation -->
                    <div class="flex justify-between items-center mb-4 px-2">
                        <button id="mpPrevYear" class="p-2 rounded-lg bg-gray-100 dark:bg-dark-border hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors flex-shrink-0">
                            <i class="ph ph-caret-left text-lg"></i>
                        </button>
                        <span id="mpCurrentYear" class="text-lg font-bold">2024</span>
                        <button id="mpNextYear" class="p-2 rounded-lg bg-gray-100 dark:bg-dark-border hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors flex-shrink-0">
                            <i class="ph ph-caret-right text-lg"></i>
                        </button>
                    </div>

                    <!-- Months Grid -->
                    <div id="mpMonthsGrid" class="grid grid-cols-3 gap-2 mb-6">
                        <!-- Generated by JavaScript -->
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row gap-3">
                    <button id="mpClearBtn" class="flex-1 py-3 rounded-xl bg-gray-100 dark:bg-dark-border text-gray-700 dark:text-gray-300 font-bold hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                        Bersihkan Filter
                    </button>
                    <button id="mpApplyBtn" class="flex-1 py-3 rounded-xl bg-agri-600 text-white font-bold hover:bg-agri-700 shadow-md shadow-agri-600/30 transition-colors">
                        Terapkan
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="px-5 py-6" id="transactionListContainer">
        <!-- Render from JS -->
        <div class="flex flex-col items-center justify-center py-16 text-gray-400"><i
                class="ph ph-spinner-gap animate-spin text-4xl mb-4"></i>
            <p>Memuat Data...</p>
        </div>
    </main>

    <!-- FAB -->
    <button id="addTransactionBtn"
        class="fixed bottom-24 right-6 md:right-10 w-14 h-14 bg-agri-600 text-white rounded-full shadow-lg shadow-agri-600/40 flex items-center justify-center hover:bg-agri-700 hover:scale-[1.05] active:scale-95 transition-all z-40">
        <i class="ph ph-plus text-2xl font-bold"></i>
    </button>

    <!-- Bottom Navigation Bar -->
    <nav id="bottomNav"
        class="fixed bottom-0 left-0 right-0 bg-white dark:bg-dark-card border-t border-gray-200 dark:border-dark-border px-2 sm:px-6 py-2 sm:py-3 flex justify-around items-center z-40 transition-all duration-300 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)]">
        <a href="../index.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-house text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Beranda</span>
        </a>
        <a href="dashboard.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-chart-pie-slice text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Analitik</span>
        </a>
        <a href="transactions.html"
            class="flex flex-col items-center gap-1 text-agri-600 dark:text-agri-400 font-bold transition-all">
            <i class="ph-fill ph-swap text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Transaksi</span>
        </a>
        <a href="notes.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-notebook text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Catatan</span>
        </a>
        <a href="wallet.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-wallet text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Dompet</span>
        </a>
    </nav>

    <!-- Transaction Modal -->
    <div id="transactionModal"
        class="fixed inset-0 bg-gray-900/40 dark:bg-gray-950/70 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-end sm:items-center justify-center">
        <div class="bg-white dark:bg-dark-card w-full sm:w-[400px] max-h-[85vh] overflow-y-auto hide-scrollbar scroll-smooth sm:rounded-3xl rounded-t-3xl p-6 transform translate-y-full sm:translate-y-10 transition-transform duration-300"
            id="transactionModalContent">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold" id="modalTitle">Tambah Transaksi</h3>
                <button id="closeModalBtn"
                    class="w-8 h-8 rounded-full bg-gray-100 dark:bg-dark-border flex items-center justify-center text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <i class="ph ph-x"></i>
                </button>
            </div>

            <form id="transactionForm" class="space-y-4">
                <input type="hidden" id="transId">

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Jenis
                        Transaksi</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="income" class="peer sr-only" required>
                            <div
                                class="text-center py-2 px-1 rounded-xl border border-gray-200 dark:border-dark-border peer-checked:bg-blue-100 peer-checked:border-blue-500 peer-checked:text-blue-700 dark:peer-checked:bg-blue-900/30 dark:peer-checked:border-blue-700 dark:peer-checked:text-blue-400 text-sm font-bold transition-all">
                                Pemasukan</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="expense" class="peer sr-only">
                            <div
                                class="text-center py-2 px-1 rounded-xl border border-gray-200 dark:border-dark-border peer-checked:bg-red-100 peer-checked:border-red-500 peer-checked:text-red-700 dark:peer-checked:bg-red-900/30 dark:peer-checked:border-red-700 dark:peer-checked:text-red-400 text-sm font-bold transition-all">
                                Pengeluaran</div>
                        </label>
                    </div>
                <div id="incomeCategoryContainer" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Kategori
                            Pemasukan</label>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="cursor-pointer">
                                <input type="radio" name="incomeCategory" value="general" class="peer sr-only" checked>
                                <div
                                    class="text-center py-2 px-1 rounded-xl border border-gray-200 dark:border-dark-border peer-checked:bg-blue-100 peer-checked:border-blue-500 peer-checked:text-blue-700 dark:peer-checked:bg-blue-900/30 dark:peer-checked:border-blue-700 dark:peer-checked:text-blue-400 text-sm font-bold transition-all">
                                    Pemasukan Umum</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="incomeCategory" value="sale" class="peer sr-only">
                                <div
                                    class="text-center py-2 px-1 rounded-xl border border-gray-200 dark:border-dark-border peer-checked:bg-blue-100 peer-checked:border-blue-500 peer-checked:text-blue-700 dark:peer-checked:bg-blue-900/30 dark:peer-checked:border-blue-700 dark:peer-checked:text-blue-400 text-sm font-bold transition-all">
                                    Penjualan</div>
                            </label>
                        </div>
                    </div>

                    <div id="incomeGeneralFields" class="space-y-4 p-4 bg-blue-50 dark:bg-blue-900/10 rounded-xl border border-blue-100 dark:border-blue-900/30">
                        <div>
                            <label class="block text-sm font-medium text-blue-800 dark:text-blue-300 mb-1">Nama
                                Pemasukan</label>
                            <input type="text" id="transIncomeName" placeholder="Contoh: Hasil Panen / Jasa"
                                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-blue-500 outline-none transition-shadow">
                        </div>
                    </div>

                    <div id="saleFields" class="hidden space-y-4 p-4 bg-blue-50 dark:bg-blue-900/10 rounded-xl border border-blue-100 dark:border-blue-900/30">
                        <div>
                            <label class="block text-sm font-medium text-blue-800 dark:text-blue-300 mb-1">Nama Barang Terjual</label>
                            <input type="text" id="saleItemName" placeholder="Contoh: Kacang Tanah" class="w-full px-4 py-3 rounded-xl bg-white dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-blue-500 outline-none transition-shadow">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-sm font-medium text-blue-800 dark:text-blue-300 mb-1">Jumlah</label>
                                <input type="number" id="saleQuantity" placeholder="Contoh: 50" min="0.01" step="0.01" class="w-full px-4 py-3 rounded-xl bg-white dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-blue-500 outline-none transition-shadow">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-blue-800 dark:text-blue-300 mb-1">Satuan</label>
                                <select id="saleUnit" class="w-full px-4 py-3 rounded-xl bg-white dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-blue-500 outline-none transition-shadow appearance-none dark:[color-scheme:dark]">
                                    <option value="" disabled selected>Pilih</option>
                                    <option value="Kg">Kg</option>
                                    <option value="Meter">Meter</option>
                                    <option value="Liter">Liter</option>
                                    <option value="Ton">Ton</option>
                                    <option value="Sak">Sak</option>
                                    <option value="Goni">Goni</option>
                                    <option value="Pcs">Pcs</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-blue-800 dark:text-blue-300 mb-1">Pembeli</label>
                            <input type="text" id="saleBuyer" placeholder="Nama Pihak Pembeli" class="w-full px-4 py-3 rounded-xl bg-white dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-blue-500 outline-none transition-shadow">
                        </div>
                    </div>
                </div>

                <div id="expenseCategoryContainer" class="hidden space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Kategori
                            Pengeluaran</label>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="cursor-pointer">
                                <input type="radio" name="expenseCategory" value="general" class="peer sr-only" checked>
                                <div
                                    class="text-center py-2 px-1 rounded-xl border border-gray-200 dark:border-dark-border peer-checked:bg-red-100 peer-checked:border-red-500 peer-checked:text-red-700 dark:peer-checked:bg-red-900/30 dark:peer-checked:border-red-700 dark:peer-checked:text-red-400 text-sm font-bold transition-all">
                                    Pembelian Lain</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="expenseCategory" value="wage" class="peer sr-only">
                                <div
                                    class="text-center py-2 px-1 rounded-xl border border-gray-200 dark:border-dark-border peer-checked:bg-red-100 peer-checked:border-red-500 peer-checked:text-red-700 dark:peer-checked:bg-red-900/30 dark:peer-checked:border-red-700 dark:peer-checked:text-red-400 text-sm font-bold transition-all">
                                    Upah Kerja</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="expenseCategory" value="purchase" class="peer sr-only">
                                <div
                                    class="text-center py-2 px-1 rounded-xl border border-gray-200 dark:border-dark-border peer-checked:bg-red-100 peer-checked:border-red-500 peer-checked:text-red-700 dark:peer-checked:bg-red-900/30 dark:peer-checked:border-red-700 dark:peer-checked:text-red-400 text-sm font-bold transition-all">
                                    Pembelian</div>
                            </label>
                        </div>
                    </div>

                    <div id="wageFields"
                        class="hidden space-y-4 p-4 bg-red-50 dark:bg-red-900/10 rounded-xl border border-red-100 dark:border-red-900/30">
                        <div>
                            <label class="block text-sm font-medium text-red-800 dark:text-red-300 mb-2">Tipe
                                Upah</label>
                            <div class="grid grid-cols-2 gap-2">
                                <label class="cursor-pointer">
                                    <input type="radio" name="wageType" value="daily" class="peer sr-only" checked>
                                    <div
                                        class="text-center py-2 px-1 rounded-xl border border-red-200 dark:border-red-800 peer-checked:bg-red-200 peer-checked:border-red-500 peer-checked:text-red-800 dark:peer-checked:bg-red-800/40 dark:peer-checked:border-red-500 dark:peer-checked:text-red-200 text-sm font-bold transition-all">
                                        Harian</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="wageType" value="monthly" class="peer sr-only">
                                    <div
                                        class="text-center py-2 px-1 rounded-xl border border-red-200 dark:border-red-800 peer-checked:bg-red-200 peer-checked:border-red-500 peer-checked:text-red-800 dark:peer-checked:bg-red-800/40 dark:peer-checked:border-red-500 dark:peer-checked:text-red-200 text-sm font-bold transition-all">
                                        Bulanan</div>
                                </label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-red-800 dark:text-red-300 mb-1">Nama
                                Pekerja</label>
                            <input type="text" id="transWorkerName" placeholder="Contoh: Pak Budi"
                                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-red-500 outline-none transition-shadow">
                        </div>
                    </div>

                    <div id="purchaseFields"
                        class="hidden space-y-4 p-4 bg-red-50 dark:bg-red-900/10 rounded-xl border border-red-100 dark:border-red-900/30">
                        <div>
                            <label class="block text-sm font-medium text-red-800 dark:text-red-300 mb-1">Nama
                                Item</label>
                            <input type="text" id="transItemName" placeholder="Contoh: Bibit Jagung"
                                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-red-500 outline-none transition-shadow">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label
                                    class="block text-sm font-medium text-red-800 dark:text-red-300 mb-1">Jumlah</label>
                                <input type="number" id="transItemQuantity" placeholder="Contoh: 10" min="0.01"
                                    step="0.01"
                                    class="w-full px-4 py-3 rounded-xl bg-white dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-red-500 outline-none transition-shadow">
                            </div>
                            <div>
                                <label
                                    class="block text-sm font-medium text-red-800 dark:text-red-300 mb-1">Satuan</label>
                                <select id="transItemUnit"
                                    class="w-full px-4 py-3 rounded-xl bg-white dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-red-500 outline-none transition-shadow appearance-none dark:[color-scheme:dark]">
                                    <option value="" disabled selected>Pilih</option>
                                    <option value="Kg">Kg</option>
                                    <option value="Meter">Meter</option>
                                    <option value="Liter">Liter</option>
                                    <option value="Ton">Ton</option>
                                    <option value="Sak">Sak</option>
                                    <option value="Goni">Goni</option>
                                    <option value="Pcs">Pcs</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-red-800 dark:text-red-300 mb-1">Asal
                                Barang</label>
                            <input type="text" id="transItemSupplier" placeholder="Nama Pihak Terkait"
                                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-red-500 outline-none transition-shadow">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Pilih Dompet</label>
                    <select id="transWallet" required
                        class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-agri-500 outline-none transition-shadow text-sm font-bold appearance-none dark:[color-scheme:dark]">
                        <!-- Populated by JS -->
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Jumlah (Rp)</label>
                    <input type="number" id="transAmount" required min="1"
                        class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-agri-500 outline-none transition-shadow text-lg font-bold">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Keterangan</label>
                    <input type="text" id="transNote" placeholder="Contoh: Beli Pupuk NPK"
                        class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-agri-500 outline-none transition-shadow">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tanggal</label>
                    <input type="date" id="transDate" required
                        class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border focus:ring-2 focus:ring-agri-500 outline-none transition-shadow dark:[color-scheme:dark]">
                </div>

                <div class="pt-4 pb-2 flex gap-3">
                    <button type="button" id="deleteTransBtn"
                        class="hidden px-4 py-3 rounded-xl bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 font-bold hover:bg-red-200 transition-colors">
                        <i class="ph ph-trash text-xl"></i>
                    </button>
                    <button type="submit"
                        class="flex-1 py-3 rounded-xl bg-agri-600 text-white font-bold hover:bg-agri-700 outline-none focus:ring-4 focus:ring-agri-500/50 transition-all shadow-md shadow-agri-600/30">Simpan
                        Transaksi</button>
                </div>
            </form>
        </div>
        <!-- Delete Confirmation Modal -->
        <div id="deleteConfirmModal"
            class="fixed inset-0 bg-gray-900/40 dark:bg-gray-950/70 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
            <div class="bg-white dark:bg-dark-card w-[90%] sm:w-[400px] rounded-3xl p-6 transform scale-95 transition-transform duration-300"
                id="deleteConfirmContent">
                <div
                    class="flex items-center justify-center w-16 h-16 rounded-full bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 mx-auto mb-4">
                    <i class="ph ph-warning-circle text-3xl"></i>
                </div>
                <h3 class="text-xl font-bold text-center mb-2">Hapus Transaksi</h3>
                <p class="text-gray-500 dark:text-gray-400 text-center mb-6">Apakah Anda Ingin Menghapus Data Berikut?
                </p>

                <div class="flex gap-3">
                    <button type="button" id="cancelDeleteBtn"
                        class="flex-1 py-3 rounded-xl bg-gray-100 dark:bg-dark-border text-gray-700 dark:text-gray-300 font-bold hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">Batal</button>
                    <button type="button" id="actualDeleteBtn"
                        class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700 shadow-md shadow-red-600/30 transition-colors">Hapus</button>
                </div>
            </div>
        </div>

        <script src="../js/store.js"></script>
        <script src="../js/ui.js"></script>
        <script src="../js/app.js"></script>
</body>

</html>
