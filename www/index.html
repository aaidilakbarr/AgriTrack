<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - AgriTrack</title>

    <!-- Cordova JS -->
    <script src="cordova.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        agri: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16',
                        },
                        dark: {
                            bg: '#0f172a', /* slate-900 */
                            card: '#1e293b', /* slate-800 */
                            border: '#334155', /* slate-700 */
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css\style.css">
</head>

<body id="mainBody"
    class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen pb-20 md:pb-24 transition-all duration-300">

    <!-- Header Section -->
    <header class="pt-10 pb-20 px-6 bg-gradient-to-b from-agri-50 to-transparent dark:from-agri-950/20 dark:to-transparent relative overflow-hidden">
        <!-- Abstract Shapes for Background -->
        <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 rounded-full bg-agri-400 opacity-10 blur-3xl animate-float"></div>
        <div class="absolute top-40 left-0 -ml-16 w-48 h-48 rounded-full bg-blue-400 opacity-10 blur-3xl animate-float" style="animation-delay: -2s"></div>

        <div class="flex justify-between items-center mb-8 relative z-10">
            <div class="reveal">
                <p class="text-xs font-bold text-agri-600 dark:text-agri-400 tracking-widest uppercase mb-1">AgriTrack Dashboard</p>
                <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white">Halo, Petani! 👋</h1>
            </div>
            <button id="themeToggle"
                class="w-10 h-10 rounded-full bg-gray-100 dark:bg-dark-border flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-agri-100 dark:hover:bg-agri-900/30 transition-colors">
                <i class="ph ph-moon text-xl dark:hidden"></i>
                <i class="ph ph-sun text-xl hidden dark:block"></i>
            </button>
        </div>

        <!-- Main Balance Card -->
        <div class="reveal" style="animation-delay: 0.1s">
            <div class="grad-emerald rounded-[2.5rem] p-8 text-white shadow-2xl shadow-agri-900/30 relative overflow-hidden group hover-lift">
                <!-- Decorative elements inside card -->
                <div class="absolute bottom-0 right-0 -mb-10 -mr-10 w-40 h-40 rounded-full bg-white/10 blur-2xl group-hover:scale-125 transition-transform duration-700"></div>
                
                <div class="relative z-10">
                    <div class="flex items-center gap-2 mb-4 opacity-80">
                        <i class="ph-duotone ph-wallet text-xl"></i>
                        <p class="text-xs font-semibold tracking-wider uppercase">Saldo Total Transaksi</p>
                    </div>
                    <h2 class="text-4xl font-extrabold tracking-tight mb-6" id="totalBalance">Rp 0</h2>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2 px-3 py-1.5 bg-white/10 backdrop-blur-md rounded-full text-xs font-medium border border-white/10">
                            <span class="flex items-center gap-1"><i class="ph ph-trend-up"></i> +0% Bulan Ini</span>
                        </div>
                        <i class="ph-duotone ph-arrow-circle-right text-3xl opacity-40"></i>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Content Area -->
    <main class="px-6 py-6 space-y-8">
        <!-- Summary Stats (Mini Cards) -->
        <div class="grid grid-cols-2 gap-4 -mt-14 relative z-20">
            <div class="premium-glass p-5 rounded-3xl reveal hover-lift" style="animation-delay: 0.2s">
                <div class="flex flex-col gap-3">
                    <div class="w-10 h-10 rounded-2xl grad-income text-white flex items-center justify-center shadow-lg shadow-emerald-500/20">
                        <i class="ph-duotone ph-arrow-down-left text-xl"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Pemasukan</p>
                        <p class="text-lg font-extrabold text-emerald-600 dark:text-emerald-400 leading-none" id="totalIncome">Rp 0</p>
                    </div>
                </div>
            </div>
            <div class="premium-glass p-5 rounded-3xl reveal hover-lift" style="animation-delay: 0.3s">
                <div class="flex flex-col gap-3">
                    <div class="w-10 h-10 rounded-2xl grad-expense text-white flex items-center justify-center shadow-lg shadow-orange-500/20">
                        <i class="ph-duotone ph-arrow-up-right text-xl"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Pengeluaran</p>
                        <p class="text-lg font-extrabold text-orange-600 dark:text-orange-400 leading-none" id="totalExpense">Rp 0</p>
                    </div>
                </div>
            </div>
        </div>


        <!-- Notes Reminder -->
        <div>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">Catatan & Pengingat</h3>
                <a href="./pages/notes.html"
                    class="text-sm font-medium text-agri-600 dark:text-agri-400 hover:text-agri-700">Lihat Semua</a>
            </div>

            <div id="recentNotesList" class="space-y-3">
                <!-- Data will be injected here via JS -->
                <div class="flex items-center justify-center py-8 text-gray-400 dark:text-gray-500 text-sm">
                    Belum ada catatan aktif.
                </div>
            </div>
        </div>

        <!-- Recent Transactions -->
        <div>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">Aktivitas Terakhir</h3>
                <a href="./pages/transactions.html"
                    class="text-sm font-medium text-agri-600 dark:text-agri-400 hover:text-agri-700">Lihat Semua</a>
            </div>

            <div id="recentTransactionsList" class="space-y-3">
                <!-- Data will be injected here via JS -->
                <div class="flex items-center justify-center py-8 text-gray-400 dark:text-gray-500 text-sm">
                    Belum ada transaksi.
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav id="bottomNav"
        class="fixed bottom-6 left-6 right-6 premium-glass rounded-[2rem] px-4 py-4 flex justify-around items-center z-50 transition-all duration-300 shadow-2xl">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-agri-600 dark:text-agri-400 font-bold transition-all transform scale-110">
            <i class="ph-duotone ph-house text-2xl"></i>
            <span class="text-[9px] uppercase tracking-tighter">Beranda</span>
        </a>
        <a href="./pages/dashboard.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium transition-all hover:scale-105">
            <i class="ph-duotone ph-chart-pie-slice text-2xl"></i>
            <span class="text-[9px] uppercase tracking-tighter">Analitik</span>
        </a>
        <a href="./pages/transactions.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium transition-all hover:scale-105">
            <i class="ph-duotone ph-swap text-2xl"></i>
            <span class="text-[9px] uppercase tracking-tighter">Transaksi</span>
        </a>
        <a href="./pages/notes.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium transition-all hover:scale-105">
            <i class="ph-duotone ph-notebook text-2xl"></i>
            <span class="text-[9px] uppercase tracking-tighter">Catatan</span>
        </a>
        <a href="./pages/wallet.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium transition-all hover:scale-105">
            <i class="ph-duotone ph-wallet text-2xl"></i>
            <span class="text-[9px] uppercase tracking-tighter">Dompet</span>
        </a>
    </nav>

    <!-- Base JS files -->
    <script src="./js/store.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
