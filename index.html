<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - AgriTrack</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        agri: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16',
                        },
                        dark: {
                            bg: '#0f172a', /* slate-900 */
                            card: '#1e293b', /* slate-800 */
                            border: '#334155', /* slate-700 */
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css\style.css">
</head>

<body id="mainBody"
    class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen pb-20 md:pb-24 transition-all duration-300">

    <!-- Header -->
    <header class="pt-8 pb-6 px-6 bg-white dark:bg-dark-card rounded-b-3xl shadow-sm z-10 relative">
        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">Selamat Datang</p>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-agri-600 to-agri-400 bg-clip-text text-transparent">
                    AgriTrack</h1>
            </div>
            <button id="themeToggle"
                class="w-10 h-10 rounded-full bg-gray-100 dark:bg-dark-border flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-agri-100 dark:hover:bg-agri-900/30 transition-colors">
                <i class="ph ph-moon text-xl dark:hidden"></i>
                <i class="ph ph-sun text-xl hidden dark:block"></i>
            </button>
        </div>

        <!-- Main Balance Card -->
        <div
            class="bg-gradient-to-br from-agri-600 to-agri-800 rounded-2xl p-6 text-white shadow-xl shadow-agri-600/20 relative overflow-hidden">
            <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-white opacity-10 blur-2xl"></div>
            <p class="text-agri-100 text-sm font-medium mb-1">Total Saldo Keuangan</p>
            <h2 class="text-3xl font-bold mb-4" id="totalBalance">Rp 0</h2>

            <div class="flex items-center gap-2 text-sm text-agri-100">
                <span class="flex items-center gap-1"><i class="ph ph-trend-up"></i> +0% bulan ini</span>
            </div>
        </div>
    </header>

    <!-- Content Area -->
    <main class="px-6 py-6 space-y-8">
        <!-- Summary Stats (Mini Cards) -->
        <div class="grid grid-cols-2 gap-4">
            <div
                class="bg-white dark:bg-dark-card p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border">
                <div class="flex items-center gap-3 mb-2">
                    <div
                        class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center">
                        <i class="ph ph-arrow-down-left text-lg"></i>
                    </div>
                    <p class="text-xs font-medium text-gray-500 dark:text-gray-400">Pemasukan</p>
                </div>
                <p class="text-lg font-bold" id="totalIncome">Rp 0</p>
            </div>
            <div
                class="bg-white dark:bg-dark-card p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border">
                <div class="flex items-center gap-3 mb-2">
                    <div
                        class="w-8 h-8 rounded-full bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 flex items-center justify-center">
                        <i class="ph ph-arrow-up-right text-lg"></i>
                    </div>
                    <p class="text-xs font-medium text-gray-500 dark:text-gray-400">Pengeluaran</p>
                </div>
                <p class="text-lg font-bold" id="totalExpense">Rp 0</p>
            </div>
        </div>


        <!-- Notes Reminder -->
        <div>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">Catatan & Pengingat</h3>
                <a href="./pages/notes.html"
                    class="text-sm font-medium text-agri-600 dark:text-agri-400 hover:text-agri-700">Lihat Semua</a>
            </div>

            <div id="recentNotesList" class="space-y-3">
                <!-- Data will be injected here via JS -->
                <div class="flex items-center justify-center py-8 text-gray-400 dark:text-gray-500 text-sm">
                    Belum ada catatan aktif.
                </div>
            </div>
        </div>

        <!-- Recent Transactions -->
        <div>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">Aktivitas Terakhir</h3>
                <a href="./pages/transactions.html"
                    class="text-sm font-medium text-agri-600 dark:text-agri-400 hover:text-agri-700">Lihat Semua</a>
            </div>

            <div id="recentTransactionsList" class="space-y-3">
                <!-- Data will be injected here via JS -->
                <div class="flex items-center justify-center py-8 text-gray-400 dark:text-gray-500 text-sm">
                    Belum ada transaksi.
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav id="bottomNav"
        class="fixed bottom-0 left-0 right-0 bg-white dark:bg-dark-card border-t border-gray-200 dark:border-dark-border px-2 sm:px-6 py-2 sm:py-3 flex justify-around items-center z-50 transition-all duration-300 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)]">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-agri-600 dark:text-agri-400 font-bold transition-all">
            <i class="ph-fill ph-house text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Beranda</span>
        </a>
        <a href="./pages/dashboard.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-chart-pie-slice text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Analitik</span>
        </a>
        <a href="./pages/transactions.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-swap text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Transaksi</span>
        </a>
        <a href="./pages/notes.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-notebook text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Catatan</span>
        </a>
        <a href="./pages/wallet.html"
            class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-agri-600 dark:hover:text-agri-400 font-medium hover:font-bold transition-all">
            <i class="ph ph-wallet text-2xl sm:text-3xl"></i>
            <span class="text-[10px] sm:text-xs">Dompet</span>
        </a>
    </nav>

    <!-- Base JS files -->
    <script src="./js/store.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
